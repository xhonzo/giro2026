  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
  background: var(--ink);
  color: #fff;
  padding: 40px 52px 32px;
  border-bottom: 3px solid var(--rosa);
}
.header-inner { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 24px; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 60px; font-weight: 900; line-height: .95; letter-spacing: -1.5px; }
.header-title em { color: var(--rosa); font-style: normal; }
.header-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 8px; letter-spacing: .08em; text-transform: uppercase; }
.header-stats { display: flex; gap: 32px; }
.hstat { text-align: right; }
.hstat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; color: var(--rosa); line-height: 1; }
.hstat-lbl { font-size: 10px; color: rgba(255,255,255,.38); text-transform: uppercase; letter-spacing: .07em; margin-top: 1px; }

/* ─── TOPBAR ─── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 52px;
  display: flex;
  align-items: center;
  gap: 6px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  height: 52px;
}
.topbar-label { font-size: 11px; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .08em; margin-right: 6px; }
.fbtn {
  font-family: 'Barlow', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--ink-mid);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.fbtn:hover { border-color: #bbb; background: var(--surface); }
.fbtn.active     { background: var(--ink); color: #fff; border-color: var(--ink); }
.fbtn.fs.active  { background: var(--sprint-fg); border-color: var(--sprint-fg); }
.fbtn.fb.active  { background: var(--berg-fg);   border-color: var(--berg-fg); }
.fbtn.fh.active  { background: var(--heuvel-fg); border-color: var(--heuvel-fg); }
.fbtn.ft.active  { background: var(--tijdrit-fg);border-color: var(--tijdrit-fg); }
.progress-note { margin-left: auto; font-size: 11px; color: var(--ink-muted); white-space: nowrap; }
.progress-note strong { color: var(--rosa); }

/* ─── MAIN ─── */
.main { padding: 32px 52px 100px; max-width: 1080px; }

.week-divider { display: flex; align-items: center; gap: 16px; margin: 40px 0 14px; }
.week-divider:first-child { margin-top: 0; }
.week-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-muted); white-space: nowrap; }
.week-line { flex: 1; height: 1px; background: var(--border); }

/* ─── STAGE CARD ─── */
.stage-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: box-shadow .2s;
}
.stage-card:hover { box-shadow: 0 2px 16px rgba(0,0,0,.08); }


/* ─── CARD HEAD ─── */
.card-head {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  align-items: center;
  cursor: pointer;
  padding: 0;
  user-select: none;
  min-height: 68px;
}
.card-head:hover { background: #fdfcfa; }

.num-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 10px;
  height: 100%;
  border-right: 1px solid var(--border);
}
.num-col .enum { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; line-height: 1; color: var(--ink); }
.num-col .edate { font-size: 10px; color: var(--ink-muted); margin-top: 3px; text-align: center; }

.info-col { padding: 14px 18px; }
.route-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.15; color: var(--ink); }
.meta-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 5px; }
.meta-item { font-size: 12px; color: var(--ink-muted); }

.badge { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: .04em; }
.badge-sprint    { background: var(--sprint-bg);  color: var(--sprint-fg); }
.badge-berg      { background: var(--berg-bg);    color: var(--berg-fg); }
.badge-heuvel    { background: var(--heuvel-bg);  color: var(--heuvel-fg); }
.badge-tijdrit   { background: var(--tijdrit-bg); color: var(--tijdrit-fg); }
.badge-aankomst  { background: #fdeaea; color: #c0001a; }
.badge-rome      { background: var(--rome-bg);    color: var(--rome-fg); }

.action-col { padding: 14px 18px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.stars { font-size: 13px; letter-spacing: 1px; color: #d4900a; line-height: 1; }
.stars .dim { color: #e0dbd2; }
.chevron { font-size: 14px; color: var(--ink-muted); transition: transform .22s ease; }
.stage-card.open .chevron { transform: rotate(180deg); }

/* ─── CARD BODY ─── */
.card-body { display: none; border-top: 1px solid var(--border); }
.stage-card.open .card-body { display: block; }

/* Top section: analyse + quick stats */
.body-top {
  display: block;
}

.analyse-col { padding: 20px 24px; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--rosa); margin-bottom: 9px; }
.analyse-text { font-size: 14px; line-height: 1.8; color: var(--ink-mid); }



/* Profiles section */
.profiles-section {
  border-top: 1px solid var(--border);
  background: #f8f7f3;
  padding: 16px 22px 20px;
}
.profiles-grid {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
  align-items: flex-start;
}

/* Each thumb is clickable */
.profile-thumb {
  flex: 0 0 auto;
  cursor: zoom-in;
  position: relative;
  border-radius: 7px;
  overflow: hidden;
  border: 1.5px solid var(--border);
  transition: border-color .15s, transform .15s;
  background: #ece9e2;
}
.profile-thumb:hover { border-color: var(--rosa); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.profile-thumb.type-etappe { width: 420px; }
.profile-thumb.type-klim   { width: 200px; }
.profile-thumb.type-finish { width: 200px; }
.profile-thumb img { display: block; width: 100%; height: auto; }

/* Thumb label overlay at bottom */
.thumb-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.55));
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 14px 10px 7px;
  pointer-events: none;
}

/* Zoom hint icon */
.zoom-icon {
  position: absolute;
  top: 7px; right: 7px;
  background: rgba(0,0,0,.45);
  color: #fff;
  border-radius: 4px;
  font-size: 11px;
  padding: 3px 5px;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
}
.profile-thumb:hover .zoom-icon { opacity: 1; }

.coming-soon { font-size: 12px; color: var(--ink-muted); font-style: italic; padding: 6px 0; }

/* ─── LIGHTBOX ─── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,.88);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 24px;
}
.lightbox.active { display: flex; }

.lb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 1100px;
}
.lb-title { color: #fff; font-size: 14px; font-weight: 600; }
.lb-title span { color: rgba(255,255,255,.5); font-weight: 400; margin-left: 8px; font-size: 13px; }
.lb-close {
  background: rgba(255,255,255,.12);
  border: none; color: #fff;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.lb-close:hover { background: rgba(255,255,255,.25); }

.lb-body {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1100px;
}
.lb-img-wrap {
  max-width: 100%;
  max-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.lb-img-wrap img {
  max-width: 100%;
  max-height: calc(100vh - 160px);
  border-radius: 8px;
  object-fit: contain;
  box-shadow: 0 8px 48px rgba(0,0,0,.5);
}

.lb-nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.12);
  border: 1.5px solid rgba(255,255,255,.2);
  color: #fff;
  width: 44px; height: 44px;
  border-radius: 50%;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  user-select: none;
}
.lb-nav:hover { background: rgba(255,255,255,.25); }
.lb-nav.prev { left: -56px; }
.lb-nav.next { right: -56px; }
.lb-nav:disabled { opacity: .25; cursor: default; }

.lb-footer {
  display: flex;
  align-items: center;
  gap: 8px;
}
.lb-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.3);
  cursor: pointer;
  transition: background .15s;
}
.lb-dot.active { background: var(--rosa); }

/* ─── PRINT ─── */
@media print {
  .topbar { position: static; }
  .card-body { display: block !important; }
  .chevron { display: none; }
  .stage-card { break-inside: avoid; margin-bottom: 20px; }
  .lightbox { display: none !important; }
  .profiles-grid { flex-wrap: wrap; }
  .profile-thumb.type-etappe { width: 100%; }
  .profile-thumb.type-klim,
  .profile-thumb.type-finish { width: calc(50% - 5px); }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .header { padding: 24px 20px 20px; }
  .header-title { font-size: 40px; }
  .header-stats { display: none; }
  .topbar { padding: 0 16px; }
  .main { padding: 20px 16px 80px; }
  .body-top { grid-template-columns: 1fr; }

  .profile-thumb.type-etappe { width: 280px; }
  .profile-thumb.type-klim, .profile-thumb.type-finish { width: 150px; }
  .lb-nav.prev { left: 4px; }
  .lb-nav.next { right: 4px; }
}

/* ─── SCORITO SECTIE ─── */
.scorito-section {
  border-top: 1px solid var(--border);
  padding: 16px 24px 20px;
  background: #fafaf7;
}
.scorito-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--rosa);
  margin-bottom: 10px;
}
.scorito-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.scorito-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 8px;
  padding: 9px 13px;
  min-width: 200px;
  flex: 0 1 280px;
  max-width: 280px;
}
.scorito-pill.rosa      { background: #fde8f0; border: 1.5px solid #f0a0bf; }
.scorito-pill.ciclamino { background: #f3eafc; border: 1.5px solid #c890e8; }
.scorito-pill.azzurra   { background: #e8f0fc; border: 1.5px solid #90b8f0; }
.scorito-pill.aanvaller { background: #e8f5ec; border: 1.5px solid #80c894; }
.scorito-pill.puncher   { background: #fef9e6; border: 1.5px solid #e8c840; }

.pill-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.rosa      .pill-dot { background: #e0006a; }
.ciclamino .pill-dot { background: #9030c0; }
.azzurra   .pill-dot { background: #1450a0; }
.aanvaller .pill-dot { background: #1a7a35; }
.puncher   .pill-dot { background: #c09000; }

.pill-content { display: flex; flex-direction: column; gap: 1px; flex: 1; }
.pill-name {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.rosa      .pill-name { color: #b0004a; }
.ciclamino .pill-name { color: #7020a8; }
.azzurra   .pill-name { color: #0a3888; }
.aanvaller .pill-name { color: #0e5c28; }
.puncher   .pill-name { color: #8a6400; }

.pill-tip {
  font-size: 12px;
  color: var(--ink-mid);
  line-height: 1.4;
}
.scorito-advice {
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink-mid);
  padding: 10px 14px;
  background: white;
  border-radius: 6px;
  border-left: 3px solid var(--rosa);
}
.scorito-advice strong { color: var(--ink); font-weight: 600; }
.scorito-pending {
  font-size: 12px;
  color: var(--ink-muted);
  font-style: italic;
}

@media (max-width: 768px) {
  .scorito-pill { min-width: 160px; }
}

/* ─── WEER & LINKS ─── */
.weer-wrap {
  padding: 12px 24px 16px;
  border-top: 1px solid var(--border);
  background: white;
}
.weer-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #006f6f;
  background: #e0f5f5;
  border: 1.5px solid #80d0d0;
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
  white-space: nowrap;
}
.weer-btn:hover {
  border-color: #009999;
  background: #c0eeee;
}
.weer-btn .weer-icon { font-size: 16px; line-height: 1; }
.weer-label { font-size: 11px; color: var(--ink-muted); font-weight: 400; margin-left: 2px; }

.topbar-links {
  display: flex;
  gap: 8px;
  margin-left: auto;
  align-items: center;
}
.topbar-link {
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--ink-mid);
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.topbar-link:hover { border-color: #aaa; background: var(--surface); }
.topbar-link.startlijst { border-color: var(--rosa); color: var(--rosa); }
.topbar-link.startlijst:hover { background: var(--rosa); color: white; }

/* ─── ETAPPE ICONEN ─── */
.type-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.type-icon svg { display: block; }

/* Icon in card header — larger */
.num-col .type-icon { margin-top: 4px; }

/* Icon inside badge */
.badge .type-icon { vertical-align: middle; margin-right: 3px; position: relative; top: -1px; }

/* ─── LOGO ─── */
.header-logo {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  mix-blend-mode: lighten;
}
.header-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
@media (max-width: 768px) {
  .header-logo { width: 60px; height: 60px; }
}

  {num:14,date:'23 mei',route:'Aosta – Pila',km:155,hm:4400,type:'berg',stars:4,badges:['berg','bergaankomst'],verdict:'Zwaarste etappe van week 2 en een vijfsterrenrit. De beklimming begint vrijwel direct na de start met de Saint-Barthélémy — er is geen opwarming. Daarna volgen de Doues, de Lin Noir en de Verrogne. De slotklim naar Pila is lang en consistent. Met vier serieuze klimmen en bijna 4.400 hoogtemeters is dit de zwaarste dag van week 2.<br><br><b>Sleutelklimmen:</b> Saint-Barthélémy (17,6 km / 5,5%, direct na start). Lin Noir (7,5 km / 7,8%). Pila finish (16,6 km / 7,1%).<br><b>Finishtype:</b> Bergop finish, lang en consistent.<br><b>Verwacht scenario:</b> Grote GC-dag. Alle klassementskopmannen gaan hier los. De vroege Saint-Barthélémy maakt het ook interessant voor een vroege vlucht. In de finale naar Pila bepaalt wie er echt de beste benen heeft in week 2.',profiles:[

  {num:16,date:'26 mei',route:'Bellinzona – Carì (ZWI)',km:113,hm:2950,type:'berg',stars:5,badges:['berg','bergaankomst'],verdict:'Week 3 opent met een bom. Slechts 113 km maar bijna 3.000 hoogtemeters — volledig in Zwitserland. Het circuit van Bellinzona wordt twee keer gereden met de Torre en de Leontica als opwarmingsklimmen. De slotklim naar Carì is het echte werk. De korte afstand betekent dat het tempo al vroeg hoog ligt — er is geen tijd om te wachten.<br><br><b>Sleutelklimmen:</b> Torre + Leontica (opwarming, 2 lussen). Carì finish (11,8 km / 8%).<br><b>Finishtype:</b> Bergop finish, steil en explosief.<br><b>Verwacht scenario:</b> Dit kan zowel voor GC-mannen als aanvallers zijn. De korte afstand maakt het moeilijk voor ploegen om volledig te controleren. Een klimmende aanvaller die ver van huis gaat heeft een reële kans. De tactiek van Visma is hier cruciaal — rijden ze defensief of offensief?',profiles:[

  {num:18,date:'28 mei',route:'Fai della Paganella – Pieve di Soligo',km:148,hm:1800,type:'heuvel',stars:2,badges:['heuvel'],verdict:'Overgangsrit door de Prosecco-heuvels. De Muro di Ca\' del Poggio (ongecategoriseerd) ligt op ongeveer 10 km van de finish en is de enige serieuze hindernis. Na de top volgt een vlakke aanloop naar Pieve di Soligo. In week 3 heeft een vermoeid peloton moeite met het volledig controleren van een sterke vlucht. GC-mannen sparen krachten met het oog op de koninginnenrit van morgen.<br><br><b>Sleutelklim:</b> Muro di Ca\' del Poggio (ongecategoriseerd, top op ~10 km van finish).<br><b>Finishtype:</b> Vlakke aanloop na korte klim.<br><b>Verwacht scenario:</b> De vlucht van de dag krijgt hier waarschijnlijk de ruimte. GC-ploegen controleren niet volledig met het oog op morgen. Een sterke aanvaller of puncher kan de Muro als springplank gebruiken. Sprinters met inhoud kunnen ook meespelen als de klim geen grote schifting maakt.',profiles:[

function render(filterType='all') {
  const main = document.getElementById('main');
  main.innerHTML = '';
  weeks.forEach(week => {
    const visible = stages.filter(s => week.ids.includes(s.num) && (filterType==='all' || s.type===filterType));
    if (!visible.length) return;
    const wd = document.createElement('div');
    wd.className = 'week-divider';
    wd.innerHTML = `<span class="week-tag">${week.label}</span><span class="week-line"></span>`;
    main.appendChild(wd);
    visible.forEach(s => {
      const card = document.createElement('div');
      card.className = 'stage-card';
      card.dataset.type = s.type;
      card.innerHTML = `
        <div class="card-head" onclick="toggleCard(this.closest('.stage-card'))">
          <div class="num-col">
            <span class="enum">E${s.num}</span>
            <span class="edate">${s.date}</span>
            ${getTypeIcon(s.type)}
          </div>
          <div class="info-col">
            <div class="route-name">${s.route}</div>
            <div class="meta-row">
              ${s.km?`<span class="meta-item">📏 ${s.km} km</span>`:''}
              <span class="meta-item">⛰ ${s.hm.toLocaleString('nl')} hm</span>
              ${makeBadges(s.badges)}
            </div>
          </div>
          <div class="action-col">${makeStars(s.stars)}<span class="chevron">▾</span></div>
        </div>
        <div class="card-body">
          <div class="body-top">
            <div class="analyse-col">
              <div class="section-label">Analyse</div>
              <div class="analyse-text">${s.verdict}</div>
            </div>

          </div>
          ${makeScoritoSection(s.num)}
          ${makeWeerBtn(s.num) ? `<div class="weer-wrap">${makeWeerBtn(s.num)}</div>` : ''}
          <div class="profiles-section">
            <div class="section-label" style="margin-bottom:10px">Profielen — klik om te vergroten</div>
            ${makeProfiles(s.profiles, s.num, s.route)}
          </div>
        </div>`;
      main.appendChild(card);
    });
  });
}

function filter(type, btn) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(type);
}

  lbStage = stages.find(s => s.num === stageNum);
  lbIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function lbClickOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lbNav(dir) {
  lbIdx = Math.max(0, Math.min(lbStage.profiles.length - 1, lbIdx + dir));
  updateLightbox();
}

function updateLightbox() {
  const p = lbStage.profiles[lbIdx];
  document.getElementById('lb-img').src = p.src;
  document.getElementById('lb-img').alt = p.label;
  document.getElementById('lb-title').innerHTML =
    `E${lbStage.num} ${lbStage.route} <span>${p.label}</span>`;
  document.getElementById('lb-prev').disabled = lbIdx === 0;
  document.getElementById('lb-next').disabled = lbIdx === lbStage.profiles.length - 1;
  // dots
  const dots = document.getElementById('lb-dots');
  dots.innerHTML = lbStage.profiles.map((_, i) =>
    `<div class="lb-dot${i===lbIdx?' active':''}" onclick="lbJump(${i})"></div>`
  ).join('');
}

function lbJump(i) { lbIdx = i; updateLightbox(); }

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape')     closeLightbox();
});

// Swipe support
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
});

render();
</script>
</body>
</html>
